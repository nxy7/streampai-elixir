services:
  postgres:
    container_name: ${COMPOSE_PROJECT_NAME:-streampai}_db
    image: postgres:18
    restart: unless-stopped
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    command: >
      postgres
      -c max_connections=500
      -c shared_buffers=256MB
      -c effective_cache_size=1GB
      -c work_mem=4MB
      -c maintenance_work_mem=64MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c default_statistics_target=100
      -c wal_level=logical
      -c max_worker_processes=32
      -c max_parallel_workers=8
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgweb:
    container_name: ${COMPOSE_PROJECT_NAME:-streampai}_pgweb
    restart: unless-stopped
    image: sosedoff/pgweb
    ports:
      - "${PGWEB_PORT:-8082}:8081"
    environment:
      - PGWEB_DATABASE_URL=postgresql://postgres:postgres@postgres:5432/postgres?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy

  minio:
    container_name: ${COMPOSE_PROJECT_NAME:-streampai}_minio
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    restart: unless-stopped
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- Observability Stack ---

  otel-collector:
    container_name: ${COMPOSE_PROJECT_NAME:-streampai}_otel_collector
    image: otel/opentelemetry-collector-contrib:0.120.0
    restart: unless-stopped
    ports:
      - "${OTEL_GRPC_PORT:-4317}:4317"
      - "${OTEL_HTTP_PORT:-4318}:4318"
    volumes:
      - ./infra/otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml
    depends_on:
      - tempo

  prometheus:
    container_name: ${COMPOSE_PROJECT_NAME:-streampai}_prometheus
    image: prom/prometheus:v3.4.0
    restart: unless-stopped
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"

  tempo:
    container_name: ${COMPOSE_PROJECT_NAME:-streampai}_tempo
    image: grafana/tempo:2.7.2
    restart: unless-stopped
    ports:
      - "${TEMPO_PORT:-3200}:3200"
    volumes:
      - ./infra/tempo.yaml:/etc/tempo/config.yaml
      - tempo_data:/var/tempo
    command: ["-config.file=/etc/tempo/config.yaml"]

  grafana:
    container_name: ${COMPOSE_PROJECT_NAME:-streampai}_grafana
    image: grafana/grafana:11.6.0
    restart: unless-stopped
    ports:
      - "${GRAFANA_PORT:-3100}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
      - tempo

volumes:
  postgres_data:
    driver: local
  minio_data:
    driver: local
  prometheus_data:
    driver: local
  tempo_data:
    driver: local
  grafana_data:
    driver: local
